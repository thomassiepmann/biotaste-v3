name: Check API Env

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  check-api-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure EXPO_PUBLIC_API_BASE_URL exists in .env.example
        run: |
          set -euo pipefail
          grep -q "^EXPO_PUBLIC_API_BASE_URL=" .env.example
